# Complete-row styling: reverse header plus alternating body backgrounds.
styles:
  table-header-row: "\e[7m"
  table-header-row-off: "\e[27m"
  table-row-odd: "\e[48;5;236m"
  table-row-even: "\e[48;5;238m"
  table-row-off: "\e[49m"

elements:
  table_header_row: { on: table-header-row, off: table-header-row-off }
  table_row_odd: { on: table-row-odd, off: table-row-off }
  table_row_even: { on: table-row-even, off: table-row-off }
